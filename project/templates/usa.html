<!DOCTYPE html>

<html lang="en">

    <head>

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Edu+QLD+Beginner&family=Frijole&family=Lugrasimo&family=Martian+Mono:wght@100..800&family=New+Rocker&family=Orbitron:wght@400..900&family=Pirata+One&family=Plaster&display=swap" rel="stylesheet">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Edu+QLD+Beginner&family=Frijole&family=Lugrasimo&family=Martian+Mono:wght@100..800&family=New+Rocker&family=Orbitron:wght@400..900&family=Pirata+One&display=swap" rel="stylesheet">
        <meta name="viewport" content="initial-scale=1,width=device-width">

    </head>

    <style>

        body {
            /* The image used */
            background-image: url('{{ url_for('static', filename='statue_of_liberty.jpg') }}'); /*

            /* Make the background image cover the entire screen */
            background-size: cover;
            background-position: top;
            background-repeat: no-repeat;
            /* Optional: Fix the image position */
            background-attachment: fixed;


        }

        .main_title {
            font-family: "Plaster", system-ui;
            text-align:center;
            color:red;
            font-weight:bold;
            font-size:40px;
        }

        .buttons {
            background:transparent;
            border:0px;
            width:130px;
        }

        .horizontal_arrange{
            display:flex;
        }

        #individual {
            padding-right:100px;
            padding-left:100px;
            padding-top:100px;
        }

        .button_image{
            border:none;
            outline:none;
            width:100px;
        }

        .button_image {
            cursor:pointer;
        }

        .hovering {
            transition: transform 0.2s ease-in-out;
        }

        .hovering:hover {
            transform:scale(1.15);
            cursor:pointer;
        }


    </style>


    <body>


        <div class="main_title">

            <u>United States of America</u>

        </div>

    <div class="horizontal_arrange">

        <form action="/ford">
        <button type="submit" class="hovering" style="border:none;outline:none;background-color:transparent;"><img src="/static/ford_logo.png" id="individual" class="buttons" alt='image'></button>
        </form>

        <form action="/cheverolet">
        <button type="submit" class="hovering" style="border:none;outline:none;background-color:transparent;"><img src="/static/cheverolet_logo.png" id="individual" class="buttons" alt='image'></button>
        </form>

        <form action="/dodge">
        <button type="submit" class="hovering" style="border:none;outline:none;background-color:transparent;"><img src="/static/dodge_logo.png" id="individual" class="buttons" alt='image'></button>
        </form>

    </div>

    <div class="horizontal_arrange">

        <form action="/pontiac">
        <button class="hovering" type="submit" style="border:none;outline:none;background-color:transparent;"><img src="/static/pontiac_logo.png" id="individual" class="buttons" alt='image'></button>
        </form>

        <form action="/shelby">
        <button type="submit" class="hovering" style="border:none;outline:none;background-color:transparent;"><img src="/static/shelby_logo.png" id="individual" class="buttons" alt='image'></button>
        </form>

        <form action="/tesla">
        <button type="submit" class="hovering" style="border:none;outline:none;background-color:transparent;"><img src="/static/tesla_logo.png" id="individual" class="buttons" alt='image'></button>
        </form>

    </div>

    <div class="horizontal_arrange">



        <form action="/">
        <button class="hovering" type="submit" style="border:none;outline:none;background-color:transparent;padding-right:100px;padding-left:100px;padding-top:100px;"><img src="/static/home_button.png" alt="go to home" class="button_image"></button>
        </form>

        <form action="/select_continent">
        <button class="hovering" type="submit" style="border:none;outline:none;background-color:transparent;padding-right:100px;padding-left:100px;padding-top:100px;"><img src="/static/back_to_continents_button.png" alt="go to home" style="width:200px" class="button_image"></button>
        </form>

    </div>
