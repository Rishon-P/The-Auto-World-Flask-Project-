    <head>

        <link rel="preconnect" href="https://fonts.googleapis.com">

    <style>

        body {
            /* The image used */
            background-image: url('{{ url_for('static', filename='france_bkg.jpg') }}'); /*

            /* Make the background image cover the entire screen */
            background-size: cover;
            background-position: top;
            background-repeat: no-repeat;
            /* Optional: Fix the image position */
            background-attachment: fixed;


        }

        .main_title {
            font-family: "Plaster", cursive;
            text-align:center;
            color:red;
            font-weight:bold;
            font-size:40px;
        }

        .buttons {
            background:transparent;
            border:0px;
            width:130px;
        }

        .horizontal_arrange{
            display:flex;
        }

        #individual {
            padding-right:100px;
            padding-left:100px;
            padding-top:100px;
        }

        .button_image{
            border:none;
            outline:none;
            width:100px;
        }


        .hovering {
            transition: transform 0.2s ease-in-out;
        }

        .hovering:hover {
            transform:scale(1.15);
            cursor:pointer;
        }

    </style>

        <div class="main_title">

            France

        </div>

    <div class="horizontal_arrange">

        </form>

        <form action="/renault_sport">
